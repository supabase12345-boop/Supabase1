<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المراهنات الرياضية - Elite Capital</title>
    
    <!-- منع التخزين المؤقت -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c8a97e;
            --primary-dark: #b38b5b;
            --primary-light: #dac09a;
            --secondary: #2c3e50;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --gold: #c8a97e;
            --gold-light: rgba(200, 169, 126, 0.15);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            --shadow-gold: 0 10px 30px rgba(200, 169, 126, 0.3);
            --gradient-gold: linear-gradient(135deg, #c8a97e, #b38b5b);
            --gradient-green: linear-gradient(135deg, #27ae60, #2ecc71);
            --gradient-red: linear-gradient(135deg, #e74c3c, #c0392b);
            --gradient-blue: linear-gradient(135deg, #3498db, #2980b9);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(200, 169, 126, 0.2);
            --card-bg: linear-gradient(145deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 100px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="%23c8a97e" stroke-width="0.5" opacity="0.05"/></svg>') repeat;
            pointer-events: none;
            z-index: -1;
        }

        /* شريط التمرير */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        /* الشريط العلوي */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--gold);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            width: 48px;
            height: 48px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--gold);
            color: var(--dark);
            transform: rotate(90deg);
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title i {
            font-size: 28px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .balance-badge {
            background: linear-gradient(135deg, rgba(39,174,96,0.15), rgba(46,204,113,0.15));
            border: 2px solid var(--success);
            border-radius: 50px;
            padding: 10px 24px;
            font-size: 18px;
            font-weight: 700;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(39, 174, 96, 0.2);
        }

        .balance-badge i {
            font-size: 20px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            background: var(--gradient-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: var(--dark);
            cursor: pointer;
            border: 2px solid var(--gold);
            position: relative;
            transition: all 0.3s;
        }

        .user-avatar:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-gold);
        }

        .user-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--dark);
        }

        .user-dropdown {
            position: absolute;
            top: 70px;
            left: 20px;
            width: 280px;
            background: var(--dark-light);
            border-radius: 24px;
            padding: 16px;
            border: 2px solid var(--gold);
            display: none;
            box-shadow: var(--shadow);
            z-index: 1001;
            backdrop-filter: blur(10px);
        }

        .user-dropdown.active {
            display: block;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            color: var(--text);
            border-radius: 16px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .user-dropdown-item:hover {
            background: rgba(200, 169, 126, 0.15);
            color: var(--gold);
            transform: translateX(-5px);
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-top: 100px;
            padding: 20px 30px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* إحصائيات المراهنات */
        .betting-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-gold);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }

        .stat-card:hover::before {
            transform: translateX(0);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .stat-icon {
            width: 65px;
            height: 65px;
            background: rgba(200, 169, 126, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: var(--gold);
            border: 1px solid var(--gold);
        }

        .stat-info {
            flex: 1;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
        }

        .stat-value.success {
            color: var(--success);
        }

        .stat-value.danger {
            color: var(--danger);
        }

        /* أزرار الفلاتر */
        .filters-section {
            margin-bottom: 30px;
        }

        .filters-title {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filters-title i {
            color: var(--gold);
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 28px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,126,0.2);
            border-radius: 50px;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn i {
            font-size: 16px;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        /* أقسام المباريات */
        .matches-section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .section-header i {
            font-size: 28px;
            color: var(--gold);
        }

        .section-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            flex: 1;
        }

        .section-header .badge {
            background: rgba(200,169,126,0.2);
            padding: 6px 16px;
            border-radius: 50px;
            color: var(--gold);
            font-size: 14px;
            border: 1px solid var(--gold);
        }

        /* شبكة المباريات */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
        }

        .match-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px;
            border: 2px solid var(--glass-border);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-gold);
            transform: translateY(-100%);
            transition: transform 0.4s;
        }

        .match-card:hover::before {
            transform: translateY(0);
        }

        .match-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .match-card.live {
            border-color: var(--danger);
            animation: pulse-border 2s infinite;
        }

        .match-card.live::before {
            background: var(--gradient-red);
        }

        .match-card.finished {
            opacity: 0.9;
            border-color: var(--text-muted);
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .match-league {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(200, 169, 126, 0.15);
            border-radius: 50px;
            color: var(--gold);
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid var(--gold);
            font-weight: 500;
        }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .team-logo {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 36px;
            font-weight: bold;
            color: var(--gold);
            border: 2px solid var(--gold);
            transition: all 0.3s;
        }

        .match-card:hover .team-logo {
            transform: scale(1.05);
            box-shadow: var(--shadow-gold);
        }

        .team-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .team-score {
            font-size: 32px;
            color: var(--gold);
            font-weight: 900;
            text-shadow: 0 0 10px rgba(200, 169, 126, 0.3);
        }

        .match-vs {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            margin: 0 20px;
            text-shadow: 0 0 15px rgba(200, 169, 126, 0.5);
        }

        .match-time {
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            padding: 12px 20px;
            text-align: center;
            margin-bottom: 25px;
            font-size: 15px;
            color: var(--text-muted);
            border: 1px solid rgba(200,169,126,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .match-time i {
            color: var(--gold);
            font-size: 16px;
        }

        .match-time.live {
            background: rgba(231, 76, 60, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        .match-time.live i {
            color: var(--danger);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .match-result {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(200,169,126,0.1);
            border-radius: 25px;
            border: 1px solid var(--gold);
        }

        .match-result-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .match-result-score {
            font-size: 36px;
            font-weight: 900;
            color: var(--gold);
        }

        /* خيارات الرهان */
        .bet-options-title {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bet-options-title i {
            color: var(--gold);
        }

        .bet-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .bet-option {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(200,169,126,0.2);
            border-radius: 25px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .bet-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-gold);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .bet-option:hover::before,
        .bet-option.selected::before {
            transform: scaleX(1);
        }

        .bet-option:hover {
            background: rgba(200,169,126,0.1);
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        .bet-option.selected {
            background: var(--gold);
            border-color: var(--gold);
        }

        .bet-option.selected .bet-value,
        .bet-option.selected .bet-odds {
            color: var(--dark);
        }

        .bet-value {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .bet-odds {
            font-size: 22px;
            color: var(--gold);
            font-weight: 900;
        }

        .bet-option.selected .bet-odds {
            color: var(--dark);
        }

        /* قسم النتيجة الدقيقة */
        .exact-score-section {
            background: rgba(200, 169, 126, 0.08);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(200,169,126,0.3);
        }

        .exact-score-title {
            font-size: 16px;
            color: var(--gold);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .exact-score-title i {
            font-size: 20px;
        }

        .exact-score-inputs {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .score-input {
            flex: 1;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(200,169,126,0.3);
            border-radius: 20px;
            color: white;
            font-size: 20px;
            text-align: center;
            font-weight: 700;
            transition: all 0.3s;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(200,169,126,0.1);
        }

        .score-separator {
            font-size: 28px;
            color: var(--gold);
            font-weight: 900;
        }

        .exact-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: var(--gold);
            color: var(--dark);
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
        }

        .exact-badge i {
            color: var(--dark);
        }

        /* قسم مبلغ الرهان */
        .bet-amount-section {
            margin: 25px 0;
        }

        .bet-amount-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: var(--text-muted);
            font-size: 15px;
        }

        .bet-amount-label span:last-child {
            color: var(--success);
            font-weight: 600;
        }

        .bet-amount-input {
            width: 100%;
            padding: 18px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(200,169,126,0.3);
            border-radius: 25px;
            color: white;
            font-size: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .bet-amount-input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(200,169,126,0.1);
        }

        .quick-amounts {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .quick-amount {
            padding: 10px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,126,0.2);
            border-radius: 40px;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-amount:hover {
            background: var(--gold);
            color: var(--dark);
            transform: scale(1.05);
        }

        .potential-win {
            background: linear-gradient(135deg, rgba(39,174,96,0.1), rgba(46,204,113,0.1));
            border: 2px solid var(--success);
            border-radius: 25px;
            padding: 20px;
            margin: 25px 0;
            text-align: center;
        }

        .potential-win.exact {
            background: linear-gradient(135deg, rgba(200,169,126,0.1), rgba(179,139,91,0.1));
            border-color: var(--gold);
        }

        .potential-win-label {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 8px;
        }

        .potential-win-value {
            font-size: 32px;
            font-weight: 900;
        }

        .potential-win-value.success {
            color: var(--success);
        }

        .potential-win-value.gold {
            color: var(--gold);
        }

        .place-bet-btn {
            width: 100%;
            padding: 20px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 40px;
            color: var(--dark);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(200, 169, 126, 0.2);
        }

        .place-bet-btn:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-gold);
        }

        .place-bet-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* حالة عدم وجود مباريات */
        .no-matches {
            text-align: center;
            padding: 80px;
            background: rgba(200,169,126,0.03);
            border-radius: 50px;
            border: 2px dashed var(--gold);
            grid-column: 1/-1;
        }

        .no-matches i {
            font-size: 80px;
            color: var(--gold);
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .no-matches h3 {
            font-size: 28px;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .no-matches p {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* سجل المراهنات */
        .history-section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 35px;
            margin-top: 50px;
            border: 1px solid var(--glass-border);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .section-title i {
            font-size: 32px;
            color: var(--gold);
        }

        .section-title h2 {
            font-size: 26px;
            font-weight: 700;
            color: var(--gold);
            flex: 1;
        }

        .refresh-btn {
            width: 45px;
            height: 45px;
            background: rgba(200,169,126,0.1);
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            cursor: pointer;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: var(--gold);
            color: var(--dark);
            transform: rotate(180deg);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding-left: 10px;
        }

        .history-item {
            background: rgba(255,255,255,0.02);
            border-radius: 25px;
            padding: 22px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-right: 4px solid transparent;
            transition: all 0.3s;
        }

        .history-item:hover {
            background: rgba(200,169,126,0.05);
            transform: translateX(-8px);
        }

        .history-item.won {
            border-right-color: var(--success);
        }

        .history-item.lost {
            border-right-color: var(--danger);
        }

        .history-item.pending {
            border-right-color: var(--warning);
        }

        .history-icon {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }

        .history-item.won .history-icon {
            background: rgba(39,174,96,0.2);
            color: var(--success);
        }

        .history-item.lost .history-icon {
            background: rgba(231,76,60,0.2);
            color: var(--danger);
        }

        .history-item.pending .history-icon {
            background: rgba(243,156,18,0.2);
            color: var(--warning);
        }

        .history-content {
            flex: 1;
        }

        .history-match {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .history-details {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: var(--text-muted);
            flex-wrap: wrap;
            align-items: center;
        }

        .history-bet-type {
            padding: 4px 12px;
            background: rgba(200,169,126,0.15);
            border-radius: 30px;
            color: var(--gold);
            font-size: 12px;
        }

        .history-amount {
            font-weight: 700;
            font-size: 16px;
        }

        .history-item.won .history-amount {
            color: var(--success);
        }

        .history-item.lost .history-amount {
            color: var(--danger);
        }

        .history-status {
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }

        .history-item.won .history-status {
            background: rgba(39,174,96,0.2);
            color: var(--success);
        }

        .history-item.lost .history-status {
            background: rgba(231,76,60,0.2);
            color: var(--danger);
        }

        .history-item.pending .history-status {
            background: rgba(243,156,18,0.2);
            color: var(--warning);
        }

        .history-cancel {
            background: rgba(231,76,60,0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .history-cancel:hover {
            background: var(--danger);
            color: white;
            transform: scale(1.05);
        }

        /* نافذة تأكيد الرهان */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .confirm-modal.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .confirm-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 60px;
            padding: 45px;
            max-width: 500px;
            width: 100%;
            border: 3px solid var(--gold);
            text-align: center;
            box-shadow: var(--shadow-gold);
        }

        .confirm-icon {
            width: 90px;
            height: 90px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            color: var(--dark);
            margin: 0 auto 25px;
            border: 4px solid white;
        }

        .confirm-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .confirm-details {
            background: rgba(255,255,255,0.03);
            border-radius: 30px;
            padding: 30px;
            margin: 25px 0;
        }

        .confirm-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 16px;
        }

        .confirm-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .confirm-label {
            color: var(--text-muted);
        }

        .confirm-value {
            font-weight: 700;
            color: var(--gold);
        }

        .confirm-value.win {
            color: var(--success);
            font-size: 22px;
        }

        .confirm-value.win.exact {
            color: var(--gold);
        }

        .confirm-actions {
            display: flex;
            gap: 15px;
        }

        .confirm-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .confirm-btn.cancel {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--text);
        }

        .confirm-btn.confirm {
            background: var(--gold);
            color: var(--dark);
        }

        .confirm-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-gold);
        }

        /* الإشعارات */
        .toast {
            position: fixed;
            top: 120px;
            right: 30px;
            background: var(--success);
            color: white;
            padding: 18px 30px;
            border-radius: 60px;
            display: none;
            z-index: 3000;
            box-shadow: var(--shadow);
            border-right: 4px solid white;
            min-width: 350px;
            backdrop-filter: blur(10px);
            animation: slideInLeft 0.3s;
            font-size: 16px;
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.warning {
            background: var(--warning);
        }

        .toast.info {
            background: var(--secondary);
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* تحميل */
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* استجابة */
        @media (max-width: 1200px) {
            .betting-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .matches-grid {
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
            }
            
            .betting-stats {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .matches-grid {
                grid-template-columns: 1fr;
            }
            
            .match-teams {
                flex-direction: column;
                gap: 15px;
            }
            
            .match-vs {
                margin: 10px 0;
            }
            
            .history-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .balance-badge {
                display: none;
            }
            
            .toast {
                right: 10px;
                left: 10px;
                min-width: auto;
            }
            
            .exact-score-inputs {
                flex-direction: column;
            }
            
            .score-separator {
                display: none;
            }
            
            .top-bar {
                padding: 12px 15px;
            }
            
            .page-title span {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .bet-options {
                grid-template-columns: 1fr;
            }
            
            .filters {
                justify-content: center;
            }
            
            .filter-btn {
                padding: 10px 18px;
                font-size: 13px;
            }
            
            .section-header h2 {
                font-size: 20px;
            }
        }

        .glow {
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(200, 169, 126, 0.3); }
            50% { box-shadow: 0 0 40px rgba(200, 169, 126, 0.6); }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <!-- الشريط العلوي -->
    <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-right"></i>
            </a>
            <div class="page-title">
                <i class="fas fa-futbol"></i>
                <span>المراهنات الرياضية</span>
            </div>
        </div>

        <div class="user-info">
            <div class="balance-badge" id="balanceDisplay">
                <i class="fas fa-wallet"></i>
                <span>0$</span>
            </div>
            <div class="user-avatar" id="userAvatar" onclick="toggleUserMenu()">م</div>
        </div>
    </div>

    <!-- قائمة المستخدم -->
    <div class="user-dropdown" id="userDropdown">
        <div class="user-dropdown-item" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-tachometer-alt"></i>
            لوحة التحكم
        </div>
        <div class="user-dropdown-item" onclick="window.location.href='profile.html'">
            <i class="fas fa-user"></i>
            الملف الشخصي
        </div>
        <div class="user-dropdown-item" onclick="window.location.href='chat.html'">
            <i class="fas fa-comments"></i>
            الدردشة المباشرة
        </div>
        <div class="user-dropdown-item" onclick="refreshAllData()">
            <i class="fas fa-sync-alt"></i>
            تحديث البيانات
        </div>
        <div class="user-dropdown-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            تسجيل الخروج
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <!-- إحصائيات المراهنات -->
        <div class="betting-stats">
            <div class="stat-card" data-aos="fade-up">
                <div class="stat-icon">
                    <i class="fas fa-ticket-alt"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">رهاناتي</div>
                    <div class="stat-value" id="myBetsCount">0</div>
                </div>
            </div>
            <div class="stat-card" data-aos="fade-up" data-aos-delay="50">
                <div class="stat-icon">
                    <i class="fas fa-dollar-sign"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">إجمالي رهاناتي</div>
                    <div class="stat-value" id="myTotalBets">0$</div>
                </div>
            </div>
            <div class="stat-card" data-aos="fade-up" data-aos-delay="100">
                <div class="stat-icon">
                    <i class="fas fa-trophy"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">أرباحي</div>
                    <div class="stat-value success" id="myWinnings">0$</div>
                </div>
            </div>
            <div class="stat-card" data-aos="fade-up" data-aos-delay="150">
                <div class="stat-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">صافي الربح</div>
                    <div class="stat-value" id="myNetProfit">0$</div>
                </div>
            </div>
        </div>

        <!-- أزرار الفلاتر -->
        <div class="filters-section">
            <div class="filters-title">
                <i class="fas fa-filter"></i>
                <span>تصفية المباريات</span>
            </div>
            <div class="filters">
                <button class="filter-btn active" onclick="filterMatches('all')">
                    <i class="fas fa-list"></i> جميع المباريات
                </button>
                <button class="filter-btn" onclick="filterMatches('upcoming')">
                    <i class="fas fa-clock"></i> القادمة
                </button>
                <button class="filter-btn" onclick="filterMatches('live')">
                    <i class="fas fa-play-circle"></i> المباشرة
                </button>
                <button class="filter-btn" onclick="filterMatches('finished')">
                    <i class="fas fa-check-circle"></i> المنتهية
                </button>
            </div>
        </div>

        <!-- المباريات القادمة والمباشرة -->
        <div id="activeMatchesSection" class="matches-section">
            <div class="section-header">
                <i class="fas fa-fire"></i>
                <h2>المباريات المتاحة للمراهنة</h2>
                <span class="badge" id="activeMatchesCount">0</span>
            </div>
            <div class="matches-grid" id="activeMatchesGrid">
                <div class="loading-spinner"></div>
            </div>
        </div>

        <!-- المباريات المنتهية (تظهر فقط عند اختيار الفلتر) -->
        <div id="finishedMatchesSection" class="matches-section" style="display: none;">
            <div class="section-header">
                <i class="fas fa-check-circle"></i>
                <h2>المباريات المنتهية</h2>
                <span class="badge" id="finishedMatchesCount">0</span>
            </div>
            <div class="matches-grid" id="finishedMatchesGrid"></div>
        </div>

        <!-- سجل المراهنات -->
        <div class="history-section">
            <div class="section-title">
                <i class="fas fa-history"></i>
                <h2>سجل رهاناتي</h2>
                <div class="refresh-btn" onclick="loadUserBets()">
                    <i class="fas fa-sync-alt"></i>
                </div>
            </div>
            <div class="history-list" id="betsHistory">
                <div style="text-align: center; color: var(--text-muted); padding: 40px;">
                    جاري التحميل...
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة تأكيد الرهان -->
    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-content">
            <div class="confirm-icon">
                <i class="fas fa-check"></i>
            </div>
            <h3 class="confirm-title">تأكيد الرهان</h3>
            <div class="confirm-details" id="confirmDetails">
                <!-- سيتم ملؤها بالجافاسكريبت -->
            </div>
            <div class="confirm-actions">
                <button class="confirm-btn cancel" onclick="closeConfirmModal()">إلغاء</button>
                <button class="confirm-btn confirm" onclick="submitBet()">تأكيد</button>
            </div>
        </div>
    </div>

    <!-- الإشعارات -->
    <div class="toast" id="toast"></div>

    <!-- AOS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script>
        AOS.init({
            duration: 800,
            once: true
        });

        // ========== المتغيرات العامة ==========
        let currentUser = null;
        let allMatches = [];
        let userBets = [];
        let currentFilter = 'all';
        let selectedMatch = null;
        let selectedBetType = null;
        let selectedBetValue = null;
        let selectedOdds = 1.6;
        let betAmount = 0;
        let potentialWin = 0;

        // ========== التهيئة ==========
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 بدء تحميل صفحة المراهنات...');
            await checkUser();
            await loadUserBalance();
            await loadMatches();
            await loadUserBets();
            await loadBettingStats();
        });

        // التحقق من المستخدم
        async function checkUser() {
            const savedUser = localStorage.getItem('current_user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(savedUser);
            
            if (window.supabaseHelpers) {
                const result = await window.supabaseHelpers.getUserById(currentUser.id);
                if (result.success && result.data) {
                    currentUser = result.data;
                    localStorage.setItem('current_user', JSON.stringify(currentUser));
                }
            }
            
            document.getElementById('userAvatar').textContent = currentUser.name?.charAt(0).toUpperCase() || 'م';
        }

        // تحميل رصيد المستخدم
        async function loadUserBalance() {
            document.getElementById('balanceDisplay').innerHTML = `
                <i class="fas fa-wallet"></i>
                <span>${(currentUser.balance || 0).toFixed(2)}$</span>
            `;
        }

        // تحميل المباريات
        async function loadMatches() {
            try {
                const result = await window.supabaseHelpers.getAllMatches();
                
                if (result.success && result.data) {
                    allMatches = result.data;
                    displayMatchesByFilter();
                }
            } catch (error) {
                console.error('خطأ في تحميل المباريات:', error);
                showToast('❌ حدث خطأ في تحميل المباريات', 'error');
            }
        }

        // عرض المباريات حسب الفلتر
        function displayMatchesByFilter() {
            const now = new Date().toISOString();
            
            // تقسيم المباريات
            const activeMatches = allMatches.filter(m => 
                (m.status === 'upcoming' && m.match_date > now) || m.status === 'live'
            );
            
            const finishedMatches = allMatches.filter(m => 
                m.status === 'finished' || (m.status === 'upcoming' && m.match_date <= now)
            );
            
            // تحديث العداد
            document.getElementById('activeMatchesCount').textContent = activeMatches.length;
            document.getElementById('finishedMatchesCount').textContent = finishedMatches.length;
            
            // عرض المباريات حسب الفلتر المحدد
            if (currentFilter === 'all') {
                // عرض المباريات النشطة فقط في القسم الرئيسي
                displayActiveMatches(activeMatches);
                document.getElementById('activeMatchesSection').style.display = 'block';
                document.getElementById('finishedMatchesSection').style.display = 'none';
            } else if (currentFilter === 'upcoming') {
                const upcoming = activeMatches.filter(m => m.status === 'upcoming');
                displayActiveMatches(upcoming);
                document.getElementById('activeMatchesSection').style.display = 'block';
                document.getElementById('finishedMatchesSection').style.display = 'none';
            } else if (currentFilter === 'live') {
                const live = activeMatches.filter(m => m.status === 'live');
                displayActiveMatches(live);
                document.getElementById('activeMatchesSection').style.display = 'block';
                document.getElementById('finishedMatchesSection').style.display = 'none';
            } else if (currentFilter === 'finished') {
                displayFinishedMatches(finishedMatches);
                document.getElementById('activeMatchesSection').style.display = 'none';
                document.getElementById('finishedMatchesSection').style.display = 'block';
            }
        }

        // عرض المباريات النشطة (قادمة + مباشرة)
        function displayActiveMatches(matches) {
            const grid = document.getElementById('activeMatchesGrid');
            
            if (!matches || matches.length === 0) {
                grid.innerHTML = `
                    <div class="no-matches">
                        <i class="fas fa-futbol"></i>
                        <h3>لا توجد مباريات متاحة</h3>
                        <p>لا توجد مباريات في هذا التصنيف حالياً</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            matches.sort((a, b) => new Date(a.match_date) - new Date(b.match_date));
            
            matches.forEach(match => {
                const matchDate = new Date(match.match_date);
                const nowDate = new Date();
                const isLive = match.status === 'live';
                const canBet = match.status === 'upcoming' && matchDate > nowDate;
                
                const team1Logo = match.team1?.charAt(0).toUpperCase() || 'A';
                const team2Logo = match.team2?.charAt(0).toUpperCase() || 'B';
                
                let timeHtml = '';
                if (isLive) {
                    timeHtml = `
                        <div class="match-time live">
                            <i class="fas fa-circle"></i> مباشر الآن
                        </div>
                    `;
                } else {
                    timeHtml = `
                        <div class="match-time">
                            <i class="far fa-calendar"></i> 
                            ${matchDate.toLocaleDateString('ar-SA')} - ${matchDate.toLocaleTimeString('ar-SA', {hour: '2-digit', minute:'2-digit'})}
                        </div>
                    `;
                }
                
                html += `
                    <div class="match-card ${isLive ? 'live' : ''}" data-aos="fade-up">
                        <span class="match-league">${match.league || 'دوري أبطال أوروبا'}</span>
                        
                        <div class="match-teams">
                            <div class="team">
                                <div class="team-logo">${team1Logo}</div>
                                <div class="team-name">${match.team1}</div>
                            </div>
                            <div class="match-vs">VS</div>
                            <div class="team">
                                <div class="team-logo">${team2Logo}</div>
                                <div class="team-name">${match.team2}</div>
                            </div>
                        </div>
                        
                        ${timeHtml}
                        
                        ${canBet ? `
                            <!-- خيارات الرهان -->
                            <div class="bet-options-title">
                                <i class="fas fa-hand-pointer"></i>
                                <span>اختر توقعك</span>
                            </div>
                            
                            <div class="bet-options" id="bet-options-${match.id}">
                                <div class="bet-option" onclick="selectBetOption(${match.id}, 'simple', '1', 1.6)">
                                    <div class="bet-value">${match.team1}</div>
                                    <div class="bet-odds">x1.6</div>
                                </div>
                                <div class="bet-option" onclick="selectBetOption(${match.id}, 'simple', 'X', 1.6)">
                                    <div class="bet-value">تعادل</div>
                                    <div class="bet-odds">x1.6</div>
                                </div>
                                <div class="bet-option" onclick="selectBetOption(${match.id}, 'simple', '2', 1.6)">
                                    <div class="bet-value">${match.team2}</div>
                                    <div class="bet-odds">x1.6</div>
                                </div>
                            </div>
                            
                            <!-- قسم النتيجة الدقيقة -->
                            <div class="exact-score-section" id="exact-${match.id}">
                                <div class="exact-score-title">
                                    <i class="fas fa-bullseye"></i> 
                                    توقع النتيجة الدقيقة
                                </div>
                                <div class="exact-score-inputs">
                                    <input type="number" class="score-input" id="score1-${match.id}" min="0" max="10" placeholder="0" value="0" onchange="updateExactBet(${match.id})">
                                    <span class="score-separator">-</span>
                                    <input type="number" class="score-input" id="score2-${match.id}" min="0" max="10" placeholder="0" value="0" onchange="updateExactBet(${match.id})">
                                </div>
                                <div class="exact-badge">
                                    <i class="fas fa-star"></i> ربح x2.5
                                </div>
                            </div>
                            
                            <!-- قسم مبلغ الرهان -->
                            <div class="bet-amount-section" id="bet-amount-${match.id}" style="display: none;">
                                <div class="bet-amount-label">
                                    <span>💰 مبلغ الرهان</span>
                                    <span>الرصيد: ${(currentUser.balance || 0).toFixed(2)}$</span>
                                </div>
                                <input type="number" class="bet-amount-input" id="amount-${match.id}" placeholder="أدخل المبلغ" min="10" max="${currentUser.balance || 0}" step="5" oninput="updatePotentialWin(${match.id})">
                                
                                <div class="quick-amounts">
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 10)">10$</span>
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 25)">25$</span>
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 50)">50$</span>
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 100)">100$</span>
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 250)">250$</span>
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 500)">500$</span>
                                </div>
                                
                                <div class="potential-win" id="potential-${match.id}">
                                    <div class="potential-win-label">الربح المحتمل</div>
                                    <div class="potential-win-value success" id="potential-value-${match.id}">0$</div>
                                </div>
                                
                                <button class="place-bet-btn" onclick="openConfirmModal(${match.id})">
                                    <i class="fas fa-check-circle"></i> تأكيد الرهان
                                </button>
                            </div>
                        ` : ''}
                        
                        ${!canBet && !isLive ? `
                            <div style="text-align: center; padding: 20px; background: rgba(231,76,60,0.1); border-radius: 25px; color: var(--danger);">
                                <i class="fas fa-clock"></i> انتهى وقت المراهنة
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        // عرض المباريات المنتهية
        function displayFinishedMatches(matches) {
            const grid = document.getElementById('finishedMatchesGrid');
            
            if (!matches || matches.length === 0) {
                grid.innerHTML = `
                    <div class="no-matches">
                        <i class="fas fa-check-circle"></i>
                        <h3>لا توجد مباريات منتهية</h3>
                        <p>لم تنتهي أي مباراة بعد</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            matches.sort((a, b) => new Date(b.match_date) - new Date(a.match_date));
            
            matches.forEach(match => {
                const matchDate = new Date(match.match_date);
                const team1Logo = match.team1?.charAt(0).toUpperCase() || 'A';
                const team2Logo = match.team2?.charAt(0).toUpperCase() || 'B';
                
                html += `
                    <div class="match-card finished" data-aos="fade-up">
                        <span class="match-league">${match.league || 'دوري أبطال أوروبا'}</span>
                        
                        <div class="match-teams">
                            <div class="team">
                                <div class="team-logo">${team1Logo}</div>
                                <div class="team-name">${match.team1}</div>
                                <div class="team-score">${match.result_team1 || 0}</div>
                            </div>
                            <div class="match-vs">VS</div>
                            <div class="team">
                                <div class="team-logo">${team2Logo}</div>
                                <div class="team-name">${match.team2}</div>
                                <div class="team-score">${match.result_team2 || 0}</div>
                            </div>
                        </div>
                        
                        <div class="match-time">
                            <i class="far fa-calendar"></i> 
                            ${matchDate.toLocaleDateString('ar-SA')}
                        </div>
                        
                        <div class="match-result">
                            <div class="match-result-label">النتيجة النهائية</div>
                            <div class="match-result-score">${match.result_team1 || 0} - ${match.result_team2 || 0}</div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px;">
                            <div style="text-align: center; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 15px;">
                                <div style="font-size: 12px; color: var(--text-muted);">الرهانات</div>
                                <div style="font-size: 18px; font-weight: 700; color: var(--gold);">${match.total_bets || 0}</div>
                            </div>
                            <div style="text-align: center; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 15px;">
                                <div style="font-size: 12px; color: var(--text-muted);">إجمالي</div>
                                <div style="font-size: 18px; font-weight: 700; color: var(--gold);">${(match.total_bet_amount || 0).toFixed(0)}$</div>
                            </div>
                            <div style="text-align: center; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 15px;">
                                <div style="font-size: 12px; color: var(--text-muted);">المدفوع</div>
                                <div style="font-size: 18px; font-weight: 700; color: ${(match.total_paid_amount || 0) > 0 ? 'var(--success)' : 'var(--text-muted)'};">${(match.total_paid_amount || 0).toFixed(0)}$</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        // فلترة المباريات
        function filterMatches(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            displayMatchesByFilter();
        }

        // اختيار خيار الرهان
        function selectBetOption(matchId, betType, betValue, odds) {
            // إزالة التحديد السابق
            document.querySelectorAll(`#bet-options-${matchId} .bet-option`).forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // تحديد الخيار الجديد
            event.currentTarget.classList.add('selected');
            
            // حفظ البيانات
            selectedMatch = allMatches.find(m => m.id == matchId);
            selectedBetType = betType;
            selectedBetValue = betValue;
            selectedOdds = odds;
            
            // إعادة تعيين حقول النتيجة الدقيقة
            document.getElementById(`score1-${matchId}`).value = 0;
            document.getElementById(`score2-${matchId}`).value = 0;
            
            // إظهار قسم المبلغ
            document.getElementById(`bet-amount-${matchId}`).style.display = 'block';
            
            // تحديث لون صندوق الربح
            const potentialDiv = document.getElementById(`potential-${matchId}`);
            potentialDiv.classList.remove('exact');
            
            // تحديث الربح المحتمل
            const amountInput = document.getElementById(`amount-${matchId}`);
            if (amountInput.value) {
                updatePotentialWin(matchId);
            }
        }

        // تحديث رهان النتيجة الدقيقة
        function updateExactBet(matchId) {
            const score1 = parseInt(document.getElementById(`score1-${matchId}`).value) || 0;
            const score2 = parseInt(document.getElementById(`score2-${matchId}`).value) || 0;
            
            if (score1 > 0 || score2 > 0) {
                // إلغاء تحديد أي خيار عادي
                document.querySelectorAll(`#bet-options-${matchId} .bet-option`).forEach(opt => {
                    opt.classList.remove('selected');
                });
                
                // حفظ بيانات النتيجة الدقيقة
                selectedMatch = allMatches.find(m => m.id == matchId);
                selectedBetType = 'exact';
                selectedBetValue = `${score1}-${score2}`;
                selectedOdds = 2.5;
                
                // إظهار قسم المبلغ
                document.getElementById(`bet-amount-${matchId}`).style.display = 'block';
                
                // تحديث لون صندوق الربح
                const potentialDiv = document.getElementById(`potential-${matchId}`);
                potentialDiv.classList.add('exact');
                
                // تحديث الربح المحتمل
                const amountInput = document.getElementById(`amount-${matchId}`);
                if (amountInput.value) {
                    updatePotentialWin(matchId);
                }
            }
        }

        // تحديث الربح المحتمل
        function updatePotentialWin(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value) || 0;
            const score1 = parseInt(document.getElementById(`score1-${matchId}`)?.value) || 0;
            const score2 = parseInt(document.getElementById(`score2-${matchId}`)?.value) || 0;
            
            let odds = selectedOdds || 1.6;
            
            // إذا كانت نتيجة دقيقة محددة
            if (score1 > 0 || score2 > 0) {
                odds = 2.5;
            }
            
            const win = amount * odds;
            
            const winElement = document.getElementById(`potential-value-${matchId}`);
            winElement.textContent = win.toFixed(2) + '$';
            
            if (odds === 2.5) {
                winElement.className = 'potential-win-value gold';
            } else {
                winElement.className = 'potential-win-value success';
            }
            
            // حفظ البيانات للتأكيد
            betAmount = amount;
            potentialWin = win;
        }

        // تعيين مبلغ سريع
        function setQuickAmount(matchId, amount) {
            document.getElementById(`amount-${matchId}`).value = amount;
            updatePotentialWin(matchId);
        }

        // فتح نافذة تأكيد الرهان
        function openConfirmModal(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value);
            const score1 = parseInt(document.getElementById(`score1-${matchId}`)?.value) || 0;
            const score2 = parseInt(document.getElementById(`score2-${matchId}`)?.value) || 0;
            
            if (!amount || amount < 10) {
                showToast('❌ الحد الأدنى للرهان 10$', 'error');
                return;
            }
            
            if (amount > currentUser.balance) {
                showToast('❌ رصيدك غير كافي', 'error');
                return;
            }
            
            let betType = 'simple';
            let betValue = selectedBetValue;
            let odds = 1.6;
            let betText = '';
            
            if (score1 > 0 || score2 > 0) {
                betType = 'exact';
                betValue = `${score1}-${score2}`;
                odds = 2.5;
                betText = `نتيجة دقيقة ${score1} - ${score2}`;
            } else {
                if (!selectedBetValue) {
                    showToast('❌ يرجى اختيار توقعك أولاً', 'error');
                    return;
                }
                
                if (selectedBetValue === '1') betText = selectedMatch.team1;
                else if (selectedBetValue === 'X') betText = 'تعادل';
                else if (selectedBetValue === '2') betText = selectedMatch.team2;
            }
            
            const win = amount * odds;
            
            document.getElementById('confirmDetails').innerHTML = `
                <div class="confirm-row">
                    <span class="confirm-label">المباراة:</span>
                    <span class="confirm-value">${selectedMatch.team1} vs ${selectedMatch.team2}</span>
                </div>
                <div class="confirm-row">
                    <span class="confirm-label">توقعك:</span>
                    <span class="confirm-value">${betText}</span>
                </div>
                <div class="confirm-row">
                    <span class="confirm-label">نسبة الربح:</span>
                    <span class="confirm-value" style="color: ${odds === 2.5 ? 'var(--gold)' : 'var(--success)'};">x${odds}</span>
                </div>
                <div class="confirm-row">
                    <span class="confirm-label">مبلغ الرهان:</span>
                    <span class="confirm-value">${amount.toFixed(2)}$</span>
                </div>
                <div class="confirm-row">
                    <span class="confirm-label">الربح المحتمل:</span>
                    <span class="confirm-value win ${odds === 2.5 ? 'exact' : ''}" style="color: ${odds === 2.5 ? 'var(--gold)' : 'var(--success)'};">${win.toFixed(2)}$</span>
                </div>
            `;
            
            // حفظ بيانات الرهان
            window.currentBetData = {
                matchId: matchId,
                betType: betType,
                betValue: betValue,
                amount: amount,
                odds: odds,
                win: win
            };
            
            document.getElementById('confirmModal').classList.add('active');
        }

        // إغلاق نافذة التأكيد
        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        // تقديم الرهان
        async function submitBet() {
            const betData = window.currentBetData;
            if (!betData) return;
            
            showToast('جاري تقديم الرهان...', 'info');
            
            try {
                const result = await window.supabaseHelpers.placeBet({
                    userId: currentUser.id,
                    matchId: betData.matchId,
                    betType: betData.betType,
                    betValue: betData.betValue,
                    amount: betData.amount,
                    odds: betData.odds
                });
                
                if (result.success) {
                    closeConfirmModal();
                    showToast('✅ تم تقديم الرهان بنجاح');
                    
                    // تحديث البيانات
                    await checkUser();
                    await loadUserBalance();
                    await loadUserBets();
                    await loadMatches();
                    
                    // إعادة تعيين التحديد
                    selectedMatch = null;
                    selectedBetType = null;
                    selectedBetValue = null;
                    selectedOdds = 1.6;
                    betAmount = 0;
                    potentialWin = 0;
                } else {
                    showToast('❌ ' + (result.error || 'فشل تقديم الرهان'), 'error');
                }
            } catch (error) {
                console.error('خطأ في تقديم الرهان:', error);
                showToast('❌ ' + error.message, 'error');
            }
        }

        // تحميل رهانات المستخدم
        async function loadUserBets() {
            try {
                const result = await window.supabaseHelpers.getUserBets(currentUser.id);
                
                if (result.success && result.data) {
                    userBets = result.data;
                    displayUserBets();
                    updateUserBetStats();
                }
            } catch (error) {
                console.error('خطأ في تحميل الرهانات:', error);
            }
        }

        // عرض رهانات المستخدم
        function displayUserBets() {
            const container = document.getElementById('betsHistory');
            
            if (!userBets || userBets.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; color: var(--text-muted); padding: 50px;">
                        <i class="fas fa-ticket-alt fa-3x" style="opacity: 0.3; margin-bottom: 15px;"></i>
                        <p>لا توجد رهانات سابقة</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            userBets.slice(0, 20).forEach(bet => {
                const match = bet.matches;
                if (!match) return;
                
                const date = new Date(bet.created_at).toLocaleDateString('ar-SA');
                
                let betText = '';
                if (bet.bet_type === 'exact') {
                    betText = `نتيجة ${bet.bet_value}`;
                } else {
                    if (bet.bet_value === '1') betText = match.team1;
                    else if (bet.bet_value === 'X') betText = 'تعادل';
                    else if (bet.bet_value === '2') betText = match.team2;
                }
                
                let statusClass = 'pending';
                let statusText = 'قيد الانتظار';
                
                if (bet.status === 'won') {
                    statusClass = 'won';
                    statusText = 'فائز 🏆';
                } else if (bet.status === 'lost') {
                    statusClass = 'lost';
                    statusText = 'خاسر';
                } else if (bet.status === 'refunded') {
                    statusClass = 'pending';
                    statusText = 'ملغي';
                }
                
                const canCancel = bet.status === 'pending' && match.status === 'upcoming' && new Date(match.match_date) > new Date();
                
                html += `
                    <div class="history-item ${statusClass}">
                        <div class="history-icon">
                            <i class="fas ${bet.status === 'won' ? 'fa-trophy' : bet.status === 'lost' ? 'fa-times' : 'fa-clock'}"></i>
                        </div>
                        <div class="history-content">
                            <div class="history-match">${match.team1} vs ${match.team2}</div>
                            <div class="history-details">
                                <span><i class="fas fa-tag"></i> ${betText}</span>
                                <span class="history-bet-type">${bet.bet_type === 'exact' ? '🎯 دقيقة' : '⚽ عادي'}</span>
                                <span><i class="fas fa-percent"></i> x${bet.odds}</span>
                                <span class="history-amount">${bet.amount}$</span>
                                ${bet.status === 'won' ? `<span class="history-amount" style="color: var(--success);">+${bet.paid_amount}$</span>` : ''}
                                <span class="history-status">${statusText}</span>
                            </div>
                            <div style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">
                                <i class="far fa-calendar"></i> ${date}
                            </div>
                        </div>
                        ${canCancel ? `
                            <button class="history-cancel" onclick="cancelBet(${bet.id})">
                                <i class="fas fa-times"></i> إلغاء
                            </button>
                        ` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // تحديث إحصائيات رهانات المستخدم
        function updateUserBetStats() {
            const totalBets = userBets.length;
            const totalAmount = userBets.reduce((sum, b) => sum + b.amount, 0);
            const totalWon = userBets.filter(b => b.status === 'won').reduce((sum, b) => sum + (b.paid_amount || 0), 0);
            const netProfit = totalWon - totalAmount;
            
            document.getElementById('myBetsCount').textContent = totalBets;
            document.getElementById('myTotalBets').textContent = totalAmount.toFixed(2) + '$';
            document.getElementById('myWinnings').textContent = totalWon.toFixed(2) + '$';
            document.getElementById('myNetProfit').textContent = netProfit.toFixed(2) + '$';
            
            if (netProfit > 0) {
                document.getElementById('myNetProfit').style.color = 'var(--success)';
            } else if (netProfit < 0) {
                document.getElementById('myNetProfit').style.color = 'var(--danger)';
            } else {
                document.getElementById('myNetProfit').style.color = 'var(--text)';
            }
        }

        // إلغاء رهان
        async function cancelBet(betId) {
            if (!confirm('هل تريد إلغاء هذا الرهان؟')) return;
            
            showToast('جاري إلغاء الرهان...', 'info');
            
            const result = await window.supabaseHelpers.cancelBet(betId, currentUser.id);
            
            if (result.success) {
                showToast('✅ تم إلغاء الرهان واسترداد المبلغ');
                await checkUser();
                await loadUserBalance();
                await loadUserBets();
                await loadMatches();
            } else {
                showToast('❌ ' + result.error, 'error');
            }
        }

        // تحميل إحصائيات المراهنات
        async function loadBettingStats() {
            try {
                await window.supabaseHelpers.getBettingStats();
            } catch (error) {
                console.error(error);
            }
        }

        // تحديث جميع البيانات
        async function refreshAllData() {
            showToast('جاري تحديث البيانات...', 'info');
            await checkUser();
            await loadUserBalance();
            await loadMatches();
            await loadUserBets();
            showToast('✅ تم تحديث البيانات');
        }

        // تبديل قائمة المستخدم
        function toggleUserMenu() {
            document.getElementById('userDropdown').classList.toggle('active');
        }

        // تسجيل الخروج
        function logout() {
            if (confirm('هل تريد تسجيل الخروج؟')) {
                localStorage.removeItem('current_user');
                window.location.href = 'index.html';
            }
        }

        // إظهار الإشعار
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('userDropdown');
            const avatar = document.getElementById('userAvatar');
            if (dropdown && avatar && !avatar.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        });

        // تحديث عند العودة للصفحة
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });

        // تحديث دوري كل 30 ثانية
        setInterval(async () => {
            if (currentUser && document.visibilityState === 'visible') {
                await loadMatches();
                await loadUserBets();
            }
        }, 30000);
    </script>
</body>
</html>
