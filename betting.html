<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المراهنات الرياضية - Elite Capital</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c8a97e;
            --primary-dark: #b38b5b;
            --primary-light: #dac09a;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --gold: #c8a97e;
            --gold-light: rgba(200, 169, 126, 0.15);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(200, 169, 126, 0.2);
            --gradient-gold: linear-gradient(135deg, #c8a97e, #b38b5b);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f172a;
            color: #fff;
            min-height: 100vh;
            padding: 20px 20px 100px;
        }

        /* شريط العلوي */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-btn {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 22px;
            text-decoration: none;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
        }

        .balance-card {
            background: rgba(39,174,96,0.1);
            border: 2px solid var(--success);
            border-radius: 40px;
            padding: 10px 22px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--success);
            font-weight: 700;
            font-size: 18px;
        }

        /* بطاقات الإحصائات - مثل الصورة بالضبط */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid rgba(200,169,126,0.2);
        }

        .stat-value {
            font-size: 22px;
            font-weight: 900;
            color: var(--gold);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* إرشادات الرهان */
        .guide-card {
            background: linear-gradient(135deg, rgba(200,169,126,0.1), rgba(179,139,91,0.1));
            border: 2px solid var(--gold);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .guide-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .guide-icon {
            width: 45px;
            height: 45px;
            background: var(--gold);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f172a;
            font-size: 20px;
        }

        .guide-text h4 {
            color: var(--gold);
            font-size: 16px;
            margin-bottom: 3px;
        }

        .guide-text p {
            color: var(--text-muted);
            font-size: 13px;
        }

        .guide-badge {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--gold);
            border-radius: 30px;
            padding: 8px 20px;
            color: var(--gold);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* بطاقة المباراة */
        .match-card {
            background: rgba(255,255,255,0.02);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(200,169,126,0.2);
            position: relative;
        }

        /* رأس المباراة */
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .match-league {
            background: rgba(200,169,126,0.1);
            border: 1px solid var(--gold);
            border-radius: 30px;
            padding: 5px 18px;
            color: var(--gold);
        }

        .match-time {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .match-time i {
            color: var(--gold);
        }

        /* الفرق بشكل أفقي */
        .teams-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 15px 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(200,169,126,0.2);
        }

        .team-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .team-logo {
            width: 60px;
            height: 60px;
            background: rgba(200,169,126,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--gold);
            border: 2px solid var(--gold);
            margin-bottom: 8px;
        }

        .team-name {
            font-size: 16px;
            font-weight: 600;
        }

        .vs-circle {
            width: 45px;
            height: 45px;
            background: rgba(200,169,126,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-weight: 900;
            border: 2px solid var(--gold);
        }

        /* خيارات الرهان */
        .bet-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .bet-option {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,126,0.3);
            border-radius: 25px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .bet-option:hover {
            border-color: var(--gold);
            background: rgba(200,169,126,0.1);
        }

        .bet-option.selected {
            background: var(--gold);
            border-color: var(--gold);
        }

        .bet-option.selected .bet-label,
        .bet-option.selected .bet-value {
            color: #0f172a;
        }

        .bet-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .bet-value {
            font-size: 22px;
            font-weight: 900;
            color: var(--gold);
        }

        /* مربع النتيجة الدقيقة - شفاف ومميز */
        .exact-box {
            background: rgba(200, 169, 126, 0.08);
            border: 2px dashed var(--gold);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(5px);
        }

        .exact-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gold);
            font-size: 15px;
            margin-bottom: 20px;
        }

        .exact-title i {
            font-size: 18px;
        }

        .exact-inputs {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .exact-team {
            flex: 1;
            text-align: center;
        }

        .exact-team label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .exact-team input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--gold);
            border-radius: 20px;
            color: white;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }

        .exact-team input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(200,169,126,0.3);
        }

        .exact-dash {
            font-size: 32px;
            color: var(--gold);
            font-weight: 900;
        }

        .exact-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--gold);
            color: #0f172a;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
        }

        /* قسم المبلغ */
        .amount-section {
            margin: 25px 0;
        }

        .amount-label {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .amount-input {
            width: 100%;
            padding: 18px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(200,169,126,0.3);
            border-radius: 30px;
            color: white;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .amount-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .quick-amounts {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .quick-amount {
            padding: 10px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,126,0.3);
            border-radius: 30px;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .quick-amount:hover {
            background: var(--gold);
            color: #0f172a;
        }

        /* الربح المحتمل */
        .profit-box {
            background: rgba(39,174,96,0.1);
            border: 2px solid var(--success);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }

        .profit-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .profit-amount {
            font-size: 36px;
            font-weight: 900;
            color: var(--success);
        }

        /* زر التأكيد */
        .confirm-btn {
            width: 100%;
            padding: 20px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 40px;
            color: #0f172a;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* سجل النشاطات */
        .activity-section {
            margin-top: 40px;
        }

        .activity-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .activity-header i {
            font-size: 24px;
            color: var(--gold);
        }

        .activity-header h3 {
            color: var(--gold);
            font-size: 20px;
            flex: 1;
        }

        .activity-list {
            background: rgba(255,255,255,0.02);
            border-radius: 30px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .activity-icon.profit { background: rgba(39,174,96,0.2); color: var(--success); }
        .activity-icon.bet { background: rgba(200,169,126,0.2); color: var(--gold); }
        .activity-icon.withdraw { background: rgba(231,76,60,0.2); color: var(--danger); }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .activity-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .activity-time {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
        }

        /* نافذة التأكيد */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 50px;
            padding: 35px;
            max-width: 450px;
            width: 100%;
            border: 3px solid var(--gold);
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: #0f172a;
        }

        .modal-title {
            text-align: center;
            color: var(--gold);
            font-size: 26px;
            margin-bottom: 25px;
        }

        .modal-details {
            background: rgba(0,0,0,0.3);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .modal-row:last-child {
            border-bottom: none;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
        }

        .modal-btn {
            flex: 1;
            padding: 16px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-cancel {
            background: transparent;
            border: 2px solid var(--gold);
            color: white;
        }

        .btn-confirm {
            background: var(--gold);
            color: #0f172a;
        }

        /* إشعارات */
        .toast {
            position: fixed;
            top: 100px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 16px 28px;
            border-radius: 60px;
            display: none;
            z-index: 1000;
            border-right: 4px solid white;
        }

        .toast.error { background: var(--danger); }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .guide-card {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .teams-row {
                flex-direction: column;
                gap: 15px;
            }
            
            .exact-inputs {
                flex-direction: column;
            }
            
            .exact-dash {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- الشريط العلوي -->
    <div class="top-bar">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <div class="page-title"><i class="fas fa-futbol"></i> المراهنات</div>
        <div class="balance-card" id="balanceDisplay">
            <i class="fas fa-wallet"></i> <span>0.00$</span>
        </div>
    </div>

    <!-- إحصائيات المستخدم -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="totalBets">0</div>
            <div class="stat-label">رهاناتي</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalAmount">0.00$</div>
            <div class="stat-label">الإجمالي</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalWins">0.00$</div>
            <div class="stat-label">أرباحي</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="netProfit">0.00$</div>
            <div class="stat-label">صافي</div>
        </div>
    </div>

    <!-- إرشادات الرهان -->
    <div class="guide-card">
        <div class="guide-item">
            <div class="guide-icon"><i class="fas fa-trophy"></i></div>
            <div class="guide-text">
                <h4>رهان فوز/تعادل</h4>
                <p>نسبة الربح x1.6</p>
            </div>
        </div>
        <div class="guide-item">
            <div class="guide-icon"><i class="fas fa-bullseye"></i></div>
            <div class="guide-text">
                <h4>رهان نتيجة دقيقة</h4>
                <p>نسبة الربح x2.5</p>
            </div>
        </div>
        <div class="guide-badge">
            <i class="fas fa-info-circle"></i> اكتب النتيجة التي تتوقعها
        </div>
    </div>

    <!-- المباريات -->
    <div id="matchesContainer"></div>

    <!-- سجل النشاطات -->
    <div class="activity-section">
        <div class="activity-header">
            <i class="fas fa-history"></i>
            <h3>سجل النشاطات</h3>
            <button class="quick-amount" onclick="loadActivities()" style="width: auto; padding: 8px 20px;">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
        </div>
        <div class="activity-list" id="activitiesList">
            <p style="text-align: center; color: var(--text-muted); padding: 20px;">جاري التحميل...</p>
        </div>
    </div>

    <!-- نافذة التأكيد -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-icon"><i class="fas fa-check"></i></div>
            <h3 class="modal-title">تأكيد الرهان</h3>
            <div class="modal-details" id="confirmDetails"></div>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeModal()">إلغاء</button>
                <button class="modal-btn btn-confirm" onclick="submitBet()">تأكيد</button>
            </div>
        </div>
    </div>

    <!-- الإشعارات -->
    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;
        let allMatches = [];
        let userBets = [];
        let activities = [];
        let selectedMatch = null;
        let selectedBetType = null;
        let selectedBetValue = null;
        let selectedOdds = 1.6;
        let currentBetData = null;

        // بدء التشغيل
        document.addEventListener('DOMContentLoaded', async () => {
            await checkUser();
            await loadUserData();
            await loadMatches();
            await loadUserBets();
            await loadActivities();
        });

        // التحقق من المستخدم
        async function checkUser() {
            const saved = localStorage.getItem('current_user');
            if (!saved) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(saved);
            
            const result = await window.supabaseHelpers?.getUserById(currentUser.id);
            if (result?.success) {
                currentUser = result.data;
                localStorage.setItem('current_user', JSON.stringify(currentUser));
            }
        }

        // تحميل بيانات المستخدم
        async function loadUserData() {
            document.getElementById('balanceDisplay').innerHTML = `
                <i class="fas fa-wallet"></i> <span>${(currentUser.balance || 0).toFixed(2)}$</span>
            `;
        }

        // تحميل المباريات
        async function loadMatches() {
            const result = await window.supabaseHelpers?.getAllMatches();
            if (result?.success) {
                allMatches = result.data.filter(m => m.status === 'upcoming');
                displayMatches();
            }
        }

        // عرض المباريات
        function displayMatches() {
            const container = document.getElementById('matchesContainer');
            
            if (!allMatches.length) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 40px;">لا توجد مباريات متاحة</p>';
                return;
            }

            let html = '';
            allMatches.forEach(match => {
                const date = new Date(match.match_date);
                
                html += `
                    <div class="match-card" id="match-${match.id}">
                        <!-- رأس المباراة -->
                        <div class="match-header">
                            <span class="match-league">${match.league || 'الدوري الإسباني'}</span>
                            <span class="match-time">
                                <i class="far fa-clock"></i> ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}
                            </span>
                        </div>

                        <!-- الفرق أفقياً -->
                        <div class="teams-row">
                            <div class="team-box">
                                <div class="team-logo">${match.team1?.charAt(0) || 'A'}</div>
                                <div class="team-name">${match.team1}</div>
                            </div>
                            <div class="vs-circle">VS</div>
                            <div class="team-box">
                                <div class="team-logo">${match.team2?.charAt(0) || 'B'}</div>
                                <div class="team-name">${match.team2}</div>
                            </div>
                        </div>

                        <!-- خيارات الرهان -->
                        <div class="bet-row" id="options-${match.id}">
                            <div class="bet-option" onclick="selectBet(${match.id}, '1', 1.6)">
                                <div class="bet-label">فوز</div>
                                <div class="bet-value">1.6</div>
                            </div>
                            <div class="bet-option" onclick="selectBet(${match.id}, 'X', 1.6)">
                                <div class="bet-label">تعادل</div>
                                <div class="bet-value">1.6</div>
                            </div>
                            <div class="bet-option" onclick="selectBet(${match.id}, '2', 1.6)">
                                <div class="bet-label">فوز</div>
                                <div class="bet-value">1.6</div>
                            </div>
                        </div>

                        <!-- مربع النتيجة الدقيقة - شفاف -->
                        <div class="exact-box">
                            <div class="exact-title">
                                <i class="fas fa-bullseye"></i>
                                إجمالي الأهداف المتوقعة:
                            </div>
                            <div class="exact-inputs">
                                <div class="exact-team">
                                    <label>${match.team1}</label>
                                    <input type="number" id="score1-${match.id}" min="0" max="10" placeholder="0" oninput="updateExact(${match.id})">
                                </div>
                                <span class="exact-dash">-</span>
                                <div class="exact-team">
                                    <label>${match.team2}</label>
                                    <input type="number" id="score2-${match.id}" min="0" max="10" placeholder="0" oninput="updateExact(${match.id})">
                                </div>
                            </div>
                            <div class="exact-badge">
                                <i class="fas fa-star"></i> نتيجة دقيقة x2.5
                            </div>
                        </div>

                        <!-- قسم المبلغ (مخفي في البداية) -->
                        <div id="amount-section-${match.id}" style="display: none;">
                            <div class="amount-label">
                                <span>💰 مبلغ الرهان</span>
                                <span>${(currentUser.balance || 0).toFixed(2)}$</span>
                            </div>
                            <input type="number" class="amount-input" id="amount-${match.id}" placeholder="أدخل المبلغ" min="5" oninput="updateProfit(${match.id})">
                            
                            <div class="quick-amounts">
                                <span class="quick-amount" onclick="setAmount(${match.id}, 10)">10$</span>
                                <span class="quick-amount" onclick="setAmount(${match.id}, 25)">25$</span>
                                <span class="quick-amount" onclick="setAmount(${match.id}, 50)">50$</span>
                                <span class="quick-amount" onclick="setAmount(${match.id}, 100)">100$</span>
                            </div>

                            <div class="profit-box" id="profit-${match.id}">
                                <div class="profit-label">الربح المحتمل</div>
                                <div class="profit-amount" id="profit-amount-${match.id}">0.00$</div>
                            </div>

                            <button class="confirm-btn" onclick="openModal(${match.id})">
                                <i class="fas fa-check-circle"></i> تأكيد الرهان
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // اختيار رهان عادي
        function selectBet(matchId, value, odds) {
            document.querySelectorAll(`#options-${matchId} .bet-option`).forEach(opt => opt.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            selectedMatch = allMatches.find(m => m.id == matchId);
            selectedBetType = 'simple';
            selectedBetValue = value;
            selectedOdds = odds;
            
            // إظهار قسم المبلغ
            document.getElementById(`amount-section-${matchId}`).style.display = 'block';
            
            // تفريغ حقول النتيجة الدقيقة
            document.getElementById(`score1-${matchId}`).value = '';
            document.getElementById(`score2-${matchId}`).value = '';
        }

        // تحديث النتيجة الدقيقة
        function updateExact(matchId) {
            const s1 = document.getElementById(`score1-${matchId}`).value;
            const s2 = document.getElementById(`score2-${matchId}`).value;
            
            if (s1 || s2) {
                // إلغاء تحديد الخيارات العادية
                document.querySelectorAll(`#options-${matchId} .bet-option`).forEach(opt => opt.classList.remove('selected'));
                
                selectedMatch = allMatches.find(m => m.id == matchId);
                selectedBetType = 'exact';
                selectedBetValue = `${s1 || 0}-${s2 || 0}`;
                selectedOdds = 2.5;
                
                // إظهار قسم المبلغ
                document.getElementById(`amount-section-${matchId}`).style.display = 'block';
                
                // تحديث الربح إذا كان هناك مبلغ
                const amount = document.getElementById(`amount-${matchId}`).value;
                if (amount) updateProfit(matchId);
            }
        }

        // تحديث الربح المحتمل
        function updateProfit(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value) || 0;
            const s1 = document.getElementById(`score1-${matchId}`).value;
            const s2 = document.getElementById(`score2-${matchId}`).value;
            
            let odds = selectedOdds || 1.6;
            if (s1 || s2) odds = 2.5;
            
            const profit = amount * odds;
            document.getElementById(`profit-amount-${matchId}`).textContent = profit.toFixed(2) + '$';
        }

        // تعيين مبلغ سريع
        function setAmount(matchId, amount) {
            document.getElementById(`amount-${matchId}`).value = amount;
            updateProfit(matchId);
        }

        // فتح نافذة التأكيد
        function openModal(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value);
            const s1 = document.getElementById(`score1-${matchId}`).value;
            const s2 = document.getElementById(`score2-${matchId}`).value;
            
            if (!amount || amount < 5) {
                showToast('الحد الأدنى للرهان 5$', 'error');
                return;
            }
            
            if (amount > currentUser.balance) {
                showToast('الرصيد غير كافي', 'error');
                return;
            }

            let betText = '';
            let odds = 1.6;
            
            if (s1 || s2) {
                betText = `${s1 || 0} - ${s2 || 0}`;
                odds = 2.5;
            } else if (selectedBetValue === '1') betText = selectedMatch.team1;
            else if (selectedBetValue === 'X') betText = 'تعادل';
            else if (selectedBetValue === '2') betText = selectedMatch.team2;
            else {
                showToast('اختر توقعك أولاً', 'error');
                return;
            }

            const profit = amount * odds;

            document.getElementById('confirmDetails').innerHTML = `
                <div class="modal-row"><span>المباراة</span><span>${selectedMatch.team1} vs ${selectedMatch.team2}</span></div>
                <div class="modal-row"><span>توقعك</span><span>${betText}</span></div>
                <div class="modal-row"><span>نسبة الربح</span><span style="color: ${odds === 2.5 ? '#c8a97e' : '#27ae60'};">x${odds}</span></div>
                <div class="modal-row"><span>المبلغ</span><span>${amount}$</span></div>
                <div class="modal-row"><span>الربح المحتمل</span><span style="color: #27ae60; font-size: 20px;">${profit.toFixed(2)}$</span></div>
            `;

            currentBetData = {
                matchId, amount, odds,
                betType: s1 || s2 ? 'exact' : 'simple',
                betValue: s1 || s2 ? `${s1 || 0}-${s2 || 0}` : selectedBetValue
            };

            document.getElementById('confirmModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        async function submitBet() {
            if (!currentBetData) return;

            const result = await window.supabaseHelpers?.placeBet({
                userId: currentUser.id,
                matchId: currentBetData.matchId,
                betType: currentBetData.betType,
                betValue: currentBetData.betValue,
                amount: currentBetData.amount,
                odds: currentBetData.odds
            });

            if (result?.success) {
                closeModal();
                showToast('✅ تم تقديم الرهان بنجاح');
                await checkUser();
                await loadUserData();
                await loadUserBets();
                await loadMatches();
                await loadActivities();
            } else {
                showToast('❌ ' + (result?.error || 'فشل تقديم الرهان'), 'error');
            }
        }

        // تحميل رهانات المستخدم
        async function loadUserBets() {
            const result = await window.supabaseHelpers?.getUserBets(currentUser.id);
            if (result?.success) {
                userBets = result.data;
                updateStats();
            }
        }

        // تحديث الإحصائيات
        function updateStats() {
            const total = userBets.length;
            const amount = userBets.reduce((s, b) => s + b.amount, 0);
            const won = userBets.filter(b => b.status === 'won').reduce((s, b) => s + (b.paid_amount || 0), 0);
            
            document.getElementById('totalBets').textContent = total;
            document.getElementById('totalAmount').textContent = amount.toFixed(2) + '$';
            document.getElementById('totalWins').textContent = won.toFixed(2) + '$';
            document.getElementById('netProfit').textContent = (won - amount).toFixed(2) + '$';
        }

        // تحميل سجل النشاطات
        async function loadActivities() {
            try {
                const { data, error } = await supabaseClient
                    .from('activity_log')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false })
                    .limit(20);

                if (error) throw error;
                activities = data || [];
                displayActivities();
            } catch (error) {
                console.error('خطأ في تحميل النشاطات:', error);
            }
        }

        // عرض سجل النشاطات
        function displayActivities() {
            const list = document.getElementById('activitiesList');
            
            if (!activities.length) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 20px;">لا توجد نشاطات</p>';
                return;
            }

            let html = '';
            activities.forEach(act => {
                let icon = 'fa-clock';
                let iconClass = 'bet';
                
                if (act.type === 'profit') {
                    icon = 'fa-coins';
                    iconClass = 'profit';
                } else if (act.type === 'bet') {
                    icon = 'fa-futbol';
                    iconClass = 'bet';
                } else if (act.type === 'withdrawal') {
                    icon = 'fa-money-bill-wave';
                    iconClass = 'withdraw';
                }

                const date = new Date(act.created_at).toLocaleDateString('ar-SA');
                
                html += `
                    <div class="activity-item">
                        <div class="activity-icon ${iconClass}">
                            <i class="fas ${icon}"></i>
                        </div>
                        <div class="activity-content">
                            <div class="activity-title">${act.title || 'نشاط'}</div>
                            <div class="activity-desc">${act.description || ''}</div>
                            <div class="activity-time"><i class="far fa-calendar"></i> ${date}</div>
                        </div>
                        ${act.amount ? `<div style="color: ${act.type === 'profit' ? '#27ae60' : '#e74c3c'}; font-weight: 700;">${act.amount > 0 ? '+' : ''}${act.amount}$</div>` : ''}
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        // إظهار الإشعارات
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
