<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الرهانات الرياضية - Elite Capital</title>
    
    <!-- منع التخزين المؤقت -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-validate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c8a97e;
            --primary-dark: #b38b5b;
            --primary-light: #dac09a;
            --secondary: #2c3e50;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --gold: #c8a97e;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            --shadow-gold: 0 10px 30px rgba(200, 169, 126, 0.3);
            --gradient-gold: linear-gradient(135deg, #c8a97e, #b38b5b);
            --gradient-sport: linear-gradient(135deg, #667eea, #764ba2);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(200, 169, 126, 0.2);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="%23c8a97e" stroke-width="0.5" opacity="0.05"/></svg>') repeat;
            pointer-events: none;
            z-index: -1;
        }

        /* شريط التمرير */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* الشريط العلوي */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--gold);
            color: var(--dark);
            transform: rotate(90deg);
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title i {
            font-size: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .date-badge {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text-muted);
            backdrop-filter: blur(10px);
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: var(--gradient-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: var(--dark);
            cursor: pointer;
            border: 2px solid var(--gold);
            position: relative;
        }

        .user-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--dark);
        }

        /* قائمة المستخدم */
        .user-dropdown {
            position: absolute;
            top: 60px;
            left: 0;
            width: 250px;
            background: var(--dark-light);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid var(--gold);
            display: none;
            box-shadow: var(--shadow);
            z-index: 1001;
        }

        .user-dropdown.active {
            display: block;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text);
            border-radius: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .user-dropdown-item:hover {
            background: rgba(200, 169, 126, 0.1);
            color: var(--gold);
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-top: 80px;
            padding: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        /* بطاقة الرصيد */
        .balance-card {
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.15), rgba(46, 204, 113, 0.15));
            border: 2px solid var(--success);
            border-radius: 25px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .balance-icon {
            width: 60px;
            height: 60px;
            background: rgba(39, 174, 96, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--success);
        }

        .balance-info {
            flex: 1;
        }

        .balance-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .balance-value {
            font-size: 32px;
            font-weight: 900;
            color: var(--success);
        }

        /* أزرار التبويب */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--gradient-gold);
            color: var(--dark);
            border-color: var(--gold);
        }

        .tab-btn i {
            font-size: 16px;
        }

        /* البطاقات الزجاجية */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .glass-card:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-gold);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background: rgba(200, 169, 126, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--gold);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            flex: 1;
        }

        /* شبكة المباريات */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .match-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.5));
            border: 2px solid rgba(200, 169, 126, 0.3);
            border-radius: 30px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .match-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: var(--shadow-gold);
        }

        .match-card.live::before {
            content: '🔴 مباشر';
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--danger);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            animation: pulse 1.5s infinite;
        }

        .match-league {
            display: inline-block;
            padding: 6px 15px;
            background: rgba(200, 169, 126, 0.2);
            border: 1px solid var(--gold);
            border-radius: 50px;
            color: var(--gold);
            font-size: 12px;
            margin-bottom: 15px;
        }

        .match-teams {
            text-align: center;
            margin: 20px 0;
        }

        .team-name {
            font-size: 24px;
            font-weight: 900;
            color: var(--text);
            margin: 5px 0;
        }

        .vs {
            font-size: 18px;
            color: var(--gold);
            margin: 10px 0;
            font-weight: 700;
        }

        .match-time {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50px;
            padding: 10px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin: 15px 0;
            border: 1px solid var(--glass-border);
        }

        .match-time i {
            color: var(--gold);
            margin-left: 5px;
        }

        /* منطقة إدخال الرهان */
        .bet-input-area {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
            text-align: center;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(200, 169, 126, 0.1);
        }

        .quick-amounts {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .quick-amount {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            min-width: 60px;
        }

        .quick-amount:hover {
            background: var(--gold);
            color: var(--dark);
        }

        .place-bet-btn {
            width: 100%;
            padding: 15px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 50px;
            color: var(--dark);
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .place-bet-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        .place-bet-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* نتيجة المباراة */
        .match-result {
            text-align: center;
            margin: 20px 0;
        }

        .result-box {
            background: rgba(39, 174, 96, 0.2);
            padding: 15px;
            border-radius: 20px;
            border: 2px solid var(--success);
        }

        .result-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .result-value {
            color: var(--success);
            font-size: 32px;
            font-weight: 900;
            margin: 0 15px;
        }

        /* جدول سجل الرهانات */
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th {
            text-align: right;
            padding: 15px;
            background: rgba(200, 169, 126, 0.1);
            color: var(--gold);
            font-weight: 600;
            border-bottom: 2px solid var(--gold);
            font-size: 14px;
        }

        .history-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        .history-table tr:hover {
            background: rgba(200, 169, 126, 0.05);
        }

        .bet-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(243, 156, 18, 0.2);
            color: var(--warning);
        }

        .status-won {
            background: rgba(39, 174, 96, 0.2);
            color: var(--success);
        }

        .status-lost {
            background: rgba(231, 76, 60, 0.2);
            color: var(--danger);
        }

        .status-cancelled {
            background: rgba(149, 165, 166, 0.2);
            color: #95a5a6;
        }

        /* حالة عدم وجود بيانات */
        .no-data {
            text-align: center;
            padding: 60px;
            background: rgba(200, 169, 126, 0.05);
            border-radius: 30px;
            border: 2px dashed var(--gold);
        }

        .no-data i {
            font-size: 60px;
            color: var(--gold);
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .no-data h3 {
            font-size: 24px;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .no-data p {
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* تحميل */
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* الإشعارات */
        .toast {
            position: fixed;
            top: 100px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 16px 24px;
            border-radius: 50px;
            display: none;
            z-index: 3000;
            box-shadow: var(--shadow);
            border-right: 4px solid white;
            min-width: 300px;
            animation: slideInLeft 0.3s;
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.warning {
            background: var(--warning);
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* أنيميشن */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* استجابة */
        @media (max-width: 992px) {
            .matches-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
            }

            .date-badge {
                display: none;
            }

            .page-title span {
                display: none;
            }

            .balance-value {
                font-size: 24px;
            }

            .tabs-container {
                justify-content: center;
            }

            .quick-amounts {
                flex-wrap: wrap;
            }

            .quick-amount {
                flex: 1 1 calc(33.333% - 7px);
            }
        }

        @media (max-width: 480px) {
            .toast {
                right: 10px;
                left: 10px;
                min-width: auto;
            }

            .history-table {
                font-size: 12px;
            }

            .history-table th,
            .history-table td {
                padding: 8px 5px;
            }
        }
    </style>
</head>
<body>
    <!-- الشريط العلوي -->
    <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-right"></i>
            </a>
            <div class="page-title">
                <i class="fas fa-futbol"></i>
                <span>الرهانات الرياضية</span>
            </div>
        </div>

        <div class="user-info">
            <div class="date-badge" id="currentDateTime"></div>
            <div class="user-avatar" id="userAvatar" onclick="toggleUserMenu()">م</div>
        </div>
    </div>

    <!-- قائمة المستخدم -->
    <div class="user-dropdown" id="userDropdown">
        <div class="user-dropdown-item" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-tachometer-alt"></i>
            لوحة التحكم
        </div>
        <div class="user-dropdown-item" onclick="window.location.href='profile.html'">
            <i class="fas fa-user"></i>
            الملف الشخصي
        </div>
        <div class="user-dropdown-item" onclick="window.location.href='chat.html'">
            <i class="fas fa-comments"></i>
            الدردشة المباشرة
        </div>
        <div class="user-dropdown-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            تسجيل الخروج
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <!-- بطاقة الرصيد -->
        <div class="balance-card" data-aos="fade-up">
            <div class="balance-icon">
                <i class="fas fa-wallet"></i>
            </div>
            <div class="balance-info">
                <div class="balance-label">الرصيد المتاح للرهان</div>
                <div class="balance-value" id="userBalance">0$</div>
            </div>
        </div>

        <!-- أزرار التبويب -->
        <div class="tabs-container" data-aos="fade-up">
            <div class="tab-btn active" onclick="switchTab('matches')">
                <i class="fas fa-calendar-alt"></i>
                المباريات المتاحة
            </div>
            <div class="tab-btn" onclick="switchTab('mybets')">
                <i class="fas fa-history"></i>
                سجل رهاناتي
            </div>
        </div>

        <!-- قسم المباريات -->
        <div id="matches-tab" class="tab-content active">
            <div class="glass-card">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-futbol"></i>
                    </div>
                    <h2 class="card-title">المباريات المتاحة للرهان</h2>
                </div>

                <div id="matchesContainer">
                    <!-- سيتم تحميل المباريات هنا -->
                    <div style="text-align: center; padding: 40px;">
                        <div class="loading-spinner"></div>
                        <p style="color: var(--text-muted); margin-top: 15px;">جاري تحميل المباريات...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- قسم سجل الرهانات -->
        <div id="mybets-tab" class="tab-content" style="display: none;">
            <div class="glass-card">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <h2 class="card-title">سجل رهاناتي</h2>
                </div>

                <div class="table-responsive">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>المباراة</th>
                                <th>توقعك</th>
                                <th>النتيجة</th>
                                <th>المبلغ</th>
                                <th>الربح</th>
                                <th>الحالة</th>
                                <th>التاريخ</th>
                            </tr>
                        </thead>
                        <tbody id="betsHistoryTable">
                            <tr>
                                <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 40px;">
                                    جاري تحميل الرهانات...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- الإشعارات -->
    <div class="toast" id="toast"></div>

    <!-- AOS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 800,
            once: true
        });

        // ========== المتغيرات العامة ==========
        let currentUser = null;
        let currentTab = 'matches';
        let allMatches = [];

        // ========== التهيئة ==========
        document.addEventListener('DOMContentLoaded', async function() {
            await checkUser();
            await loadUserData();
            await loadMatches();
            await loadUserBets();
            updateDateTime();
            setInterval(updateDateTime, 1000);
        });

        // تحديث الوقت
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = now.toLocaleString('ar-SA', {
                hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short'
            });
        }

        // التحقق من المستخدم
        async function checkUser() {
            const savedUser = localStorage.getItem('current_user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(savedUser);
            
            if (window.supabaseHelpers) {
                const result = await window.supabaseHelpers.getUserById(currentUser.id);
                if (result.success && result.data) {
                    currentUser = result.data;
                    localStorage.setItem('current_user', JSON.stringify(currentUser));
                }
            }
            
            const initial = currentUser.name?.charAt(0).toUpperCase() || 'م';
            document.getElementById('userAvatar').textContent = initial;
        }

        // تحميل بيانات المستخدم
        async function loadUserData() {
            document.getElementById('userBalance').textContent = (currentUser.balance || 0) + '$';
        }

        // ========== المباريات والرهانات ==========

        // تحميل المباريات
        async function loadMatches() {
            try {
                const result = await window.supabaseHelpers.getAllMatches();
                
                if (result.success && result.data) {
                    allMatches = result.data;
                    displayMatches(allMatches);
                } else {
                    displayNoMatches();
                }
            } catch (error) {
                console.error('خطأ في تحميل المباريات:', error);
                displayNoMatches();
            }
        }

        // عرض المباريات
        function displayMatches(matches) {
            const container = document.getElementById('matchesContainer');
            
            if (!matches || matches.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-futbol"></i>
                        <h3>لا توجد مباريات متاحة</h3>
                        <p>سيتم إضافة مباريات قريباً للرهان</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="matches-grid">';
            
            matches.forEach(match => {
                const matchDate = new Date(match.match_date);
                const now = new Date();
                const isUpcoming = match.status === 'upcoming';
                
                const timeStr = matchDate.toLocaleDateString('ar-SA', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                html += `
                    <div class="match-card" data-aos="fade-up">
                        <div class="match-league">
                            <i class="fas fa-trophy"></i>
                            ${match.league || 'دوري غير محدد'}
                        </div>
                        
                        <div class="match-teams">
                            <div class="team-name">${match.home_team}</div>
                            <div class="vs">VS</div>
                            <div class="team-name">${match.away_team}</div>
                        </div>
                        
                        <div class="match-time">
                            <i class="fas fa-clock"></i>
                            ${timeStr}
                        </div>
                `;

                if (isUpcoming) {
                    // مربع إدخال النتيجة للمستخدم
                    html += `
                        <div class="bet-input-area">
                            <div class="form-group">
                                <label>🔮 توقع نتيجة المباراة</label>
                                <input type="text" id="result_${match.id}" class="form-control" placeholder="مثال: 2-1" dir="ltr">
                                <small style="color: var(--text-muted);">أدخل النتيجة المتوقعة (مثال: 2-1)</small>
                            </div>
                            
                            <div class="form-group">
                                <label>💰 مبلغ الرهان ($)</label>
                                <input type="number" id="amount_${match.id}" class="form-control" min="1" value="10">
                            </div>
                            
                            <div class="quick-amounts">
                                <button class="quick-amount" onclick="setQuickAmount(${match.id}, 10)">10$</button>
                                <button class="quick-amount" onclick="setQuickAmount(${match.id}, 50)">50$</button>
                                <button class="quick-amount" onclick="setQuickAmount(${match.id}, 100)">100$</button>
                                <button class="quick-amount" onclick="setQuickAmount(${match.id}, 500)">500$</button>
                                <button class="quick-amount" onclick="setQuickAmount(${match.id}, 1000)">1000$</button>
                            </div>
                            
                            <div style="background: rgba(39, 174, 96, 0.1); border-radius: 15px; padding: 10px; margin-bottom: 15px; text-align: center;">
                                <span style="color: var(--text-muted);">الربح المحتمل:</span>
                                <span style="color: var(--success); font-size: 20px; font-weight: 900; margin-right: 10px;" id="potential_${match.id}">25$</span>
                                <span style="color: var(--text-muted);">(x2.5)</span>
                            </div>
                            
                            <button class="place-bet-btn" onclick="placeBet(${match.id})">
                                <i class="fas fa-check-circle"></i>
                                تأكيد الرهان
                            </button>
                        </div>
                    `;
                    
                    // إضافة مستمع لتحديث الربح المحتمل
                    setTimeout(() => {
                        const amountInput = document.getElementById(`amount_${match.id}`);
                        if (amountInput) {
                            amountInput.addEventListener('input', function() {
                                const amount = parseFloat(this.value) || 0;
                                const potential = amount * 2.5;
                                document.getElementById(`potential_${match.id}`).textContent = potential.toFixed(2) + '$';
                            });
                        }
                    }, 100);
                    
                } else if (match.status === 'finished' && match.result) {
                    // عرض النتيجة النهائية
                    html += `
                        <div class="match-result">
                            <div class="result-box">
                                <div class="result-label">النتيجة النهائية</div>
                                <div class="result-value">${match.result}</div>
                            </div>
                        </div>
                    `;
                }

                html += `</div>`;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // عرض عدم وجود مباريات
        function displayNoMatches() {
            const container = document.getElementById('matchesContainer');
            container.innerHTML = `
                <div class="no-data">
                    <i class="fas fa-futbol"></i>
                    <h3>لا توجد مباريات متاحة</h3>
                    <p>سيتم إضافة مباريات قريباً للرهان</p>
                </div>
            `;
        }

        // تعيين مبلغ سريع
        function setQuickAmount(matchId, amount) {
            const input = document.getElementById(`amount_${matchId}`);
            if (input) {
                input.value = amount;
                // تحديث الربح المحتمل
                const potential = amount * 2.5;
                document.getElementById(`potential_${matchId}`).textContent = potential.toFixed(2) + '$';
            }
        }

        // وضع رهان
        async function placeBet(matchId) {
            const resultInput = document.getElementById(`result_${matchId}`);
            const amountInput = document.getElementById(`amount_${matchId}`);
            
            const predictedResult = resultInput.value.trim();
            const amount = parseFloat(amountInput.value);
            
            if (!predictedResult) {
                showToast('❌ يرجى إدخال النتيجة المتوقعة', 'error');
                return;
            }
            
            const resultPattern = /^\d+-\d+$/;
            if (!resultPattern.test(predictedResult)) {
                showToast('❌ صيغة النتيجة غير صحيحة. مثال: 2-1', 'error');
                return;
            }
            
            if (!amount || amount < 1) {
                showToast('❌ المبلغ غير صحيح', 'error');
                return;
            }
            
            if (amount > currentUser.balance) {
                showToast('❌ الرصيد غير كافي', 'error');
                return;
            }
            
            const result = await window.supabaseHelpers.placeBet({
                userId: currentUser.id,
                matchId: matchId,
                predictedResult: predictedResult,
                amount: amount
            });
            
            if (result.success) {
                showToast(`✅ تم وضع الرهان بنجاح! الربح المحتمل: ${(amount * 2.5).toFixed(2)}$`, 'success');
                
                // تحديث بيانات المستخدم
                await checkUser();
                await loadUserData();
                await loadUserBets();
                
                // تفريغ الحقول
                resultInput.value = '';
                amountInput.value = '10';
                document.getElementById(`potential_${matchId}`).textContent = '25$';
            } else {
                showToast('❌ ' + result.error, 'error');
            }
        }

        // تحميل رهانات المستخدم
        async function loadUserBets() {
            try {
                const result = await window.supabaseHelpers.getUserBets(currentUser.id);
                
                if (result.success && result.data) {
                    displayUserBets(result.data);
                }
            } catch (error) {
                console.error('خطأ في تحميل الرهانات:', error);
            }
        }

        // عرض رهانات المستخدم
        function displayUserBets(bets) {
            const tbody = document.getElementById('betsHistoryTable');
            
            if (!bets || bets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-muted); padding: 40px;">لا توجد رهانات حتى الآن</td></tr>';
                return;
            }

            let html = '';
            bets.forEach(bet => {
                let statusClass = 'status-pending';
                let statusText = 'معلق';
                
                switch(bet.status) {
                    case 'won':
                        statusClass = 'status-won';
                        statusText = '🏆 فائز';
                        break;
                    case 'lost':
                        statusClass = 'status-lost';
                        statusText = '❌ خاسر';
                        break;
                    case 'cancelled':
                        statusClass = 'status-cancelled';
                        statusText = '🔄 ملغي';
                        break;
                }

                const matchName = bet.matches ? `${bet.matches.home_team} vs ${bet.matches.away_team}` : 'مباراة غير معروفة';
                const actualResult = bet.matches?.result || '-';
                const date = new Date(bet.created_at).toLocaleDateString('ar-SA');

                html += `
                    <tr>
                        <td>${matchName}</td>
                        <td><span style="color: var(--gold); font-weight: 700;">${bet.predicted_result}</span></td>
                        <td><span style="color: ${bet.status === 'won' && bet.predicted_result === actualResult ? 'var(--success)' : 'var(--text-muted)'};">${actualResult}</span></td>
                        <td>${bet.amount}$</td>
                        <td>${bet.status === 'won' ? bet.potential_win + '$' : '-'}</td>
                        <td><span class="bet-status ${statusClass}">${statusText}</span></td>
                        <td>${date}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        // ========== دوال مساعدة ==========

        // تبديل التبويبات
        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
            
            if (tab === 'matches') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('matches-tab').style.display = 'block';
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('mybets-tab').style.display = 'block';
                loadUserBets(); // تحديث الرهانات عند فتح التبويب
            }
        }

        // تبديل قائمة المستخدم
        function toggleUserMenu() {
            document.getElementById('userDropdown').classList.toggle('active');
        }

        // تسجيل الخروج
        function logout() {
            if (confirm('هل تريد تسجيل الخروج؟')) {
                localStorage.removeItem('current_user');
                window.location.href = 'index.html';
            }
        }

        // إظهار الإشعار
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('userDropdown');
            const avatar = document.getElementById('userAvatar');
            if (dropdown && avatar && !avatar.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        });

        // تحديث عند العودة للصفحة
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });

        // تحديث دوري
        setInterval(async () => {
            if (currentUser && document.visibilityState === 'visible') {
                await loadUserData();
                if (currentTab === 'matches') {
                    await loadMatches();
                } else {
                    await loadUserBets();
                }
            }
        }, 30000);
    </script>
</body>
</html>
